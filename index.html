<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orrelith — Digital twin engine for European smallsat operators</title>
  <meta name="description" content="Orrelith — a digital twin engine for European smallsat operators. Coming soon.">
  <meta property="og:title" content="Orrelith">
  <meta property="og:description" content="Digital twin engine for European smallsat operators.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://orrelith.space">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    /* Theme tokens. SVG strokes/fills use `currentColor` so they inherit
       from `--fg` via the body's `color` property. The silhouette polygon
       uses `--bg` so it always matches the page background and occludes
       whatever's drawn behind it without being visible itself. */
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --tagline: #222222;
      --muted: #999999;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --fg: #f5f5f5;
        --tagline: #dddddd;
        --muted: #666666;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    main {
      max-width: 760px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 100%;
      max-width: 720px;
      height: auto;
      display: block;
      margin: 0 auto 1.5rem;
    }
    #ico-silhouette { fill: var(--bg); }
    .tagline {
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      color: var(--tagline);
      margin: 0 auto 0.5rem;
      max-width: 540px;
      font-weight: 400;
    }
    .status {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    @media (max-width: 600px) {
      body { padding: 1.5rem 1rem; }
      .tagline { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <main>
    <svg class="logo" xmlns="http://www.w3.org/2000/svg"
         xmlns:xlink="http://www.w3.org/1999/xlink"
         viewBox="0 100 400 230"
         stroke="currentColor" fill="none"
         stroke-linecap="round" stroke-linejoin="round"
         role="img" aria-label="Orrelith — digital twin engine for European smallsat operators">

      <defs>
        <path id="orbit-back-path"
              d="M 69.52 200 A 155 58 -15 0 1 330.48 200"
              fill="none" stroke="none"/>
        <path id="orbit-front-path"
              d="M 330.48 200 A 155 58 -15 0 1 69.52 200"
              fill="none" stroke="none"/>
      </defs>

      <!-- Back orbit arc — visible everywhere; the silhouette polygon (drawn after)
           covers it where it overlaps the stone, giving the depth illusion. -->
      <path d="M 69.52 200 A 155 58 -15 0 1 330.48 200" stroke-width="1.2"/>

      <!-- Back satellite — drawn BEFORE silhouette so the stone occludes it on overlap.
           Active only during the 7s when satellite is on the back arc. -->
      <circle r="4" fill="currentColor" stroke="none" opacity="0">
        <animateMotion dur="14s" repeatCount="indefinite"
                       keyTimes="0;0.5;1" keyPoints="0;0;1" calcMode="linear">
          <mpath xlink:href="#orbit-back-path"/>
        </animateMotion>
        <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
                 values="0;1" keyTimes="0;0.5" calcMode="discrete"/>
      </circle>

      <!-- Stone silhouette — opaque polygon, JS updates `points` each frame to match
           the convex hull of the rotating 3D icosahedron's projected vertices. -->
      <polygon id="ico-silhouette" stroke="none"/>

      <!-- 30 wireframe edges — placeholder coords; JS replaces them each frame.
           Stroke-dasharray is applied per edge dynamically when its midpoint z<0
           (i.e. when that edge is on the back-facing side of the stone). -->
      <g stroke-width="1.4">
        <line id="edge-0"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-1"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-2"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-3"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-4"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-5"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-6"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-7"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-8"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-9"  x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-10" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-11" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-12" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-13" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-14" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-15" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-16" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-17" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-18" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-19" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-20" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-21" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-22" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-23" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-24" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-25" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-26" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-27" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-28" x1="0" y1="0" x2="0" y2="0"/>
        <line id="edge-29" x1="0" y1="0" x2="0" y2="0"/>
      </g>

      <!-- Front orbit arc — drawn after the stone, on top. -->
      <path d="M 330.48 200 A 155 58 -15 0 1 69.52 200" stroke-width="1.2"/>

      <!-- Front satellite — drawn last in its half (0–7s), always on top of stone. -->
      <circle r="4" fill="currentColor" stroke="none">
        <animateMotion dur="14s" repeatCount="indefinite"
                       keyTimes="0;0.5;1" keyPoints="0;1;1" calcMode="linear">
          <mpath xlink:href="#orbit-front-path"/>
        </animateMotion>
        <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
                 values="1;0" keyTimes="0;0.5" calcMode="discrete"/>
      </circle>

      <!-- Static wordmark (does not rotate) -->
      <g stroke-width="1.6">
        <path d="M 132 283 L 138 283 L 142 287 L 142 301 L 138 305 L 132 305 L 128 301 L 128 287 Z"/>
        <path d="M 149 305 L 149 283 L 161 283 L 161 294 L 149 294 M 155 294 L 163 305"/>
        <path d="M 170 305 L 170 283 L 182 283 L 182 294 L 170 294 M 176 294 L 184 305"/>
        <path d="M 191 283 L 203 283 M 191 305 L 203 305 M 191 283 L 191 305 M 191 294 L 201 294"/>
        <path d="M 210 283 L 210 305 L 222 305"/>
        <path d="M 231 283 L 231 305"/>
        <path d="M 240 283 L 252 283 M 246 283 L 246 305"/>
        <path d="M 259 283 L 259 305 M 273 283 L 273 305 M 259 294 L 273 294"/>
      </g>

      <!-- Real 3D wireframe rotation. Icosahedron defined by 12 vertices on a
           sphere of radius √(1+φ²); 30 edges connect every vertex to its 5
           nearest neighbours. Each frame: rotate around the Y axis, project to
           2D with a constant X-tilt, update SVG line coords, dash any edge
           whose midpoint is on the far side (z < 0). -->
      <script><![CDATA[
        (function() {
          const PHI = (1 + Math.sqrt(5)) / 2;
          const verts = [
            [ 0,  1,  PHI], [ 0, -1,  PHI], [ 0,  1, -PHI], [ 0, -1, -PHI],
            [ 1,  PHI,  0], [-1,  PHI,  0], [ 1, -PHI,  0], [-1, -PHI,  0],
            [ PHI,  0,  1], [ PHI,  0, -1], [-PHI,  0,  1], [-PHI,  0, -1]
          ];

          // Build 30-edge list: pairs at squared distance 4 (icosahedron edge length is 2)
          const edges = [];
          for (let i = 0; i < 12; i++) {
            for (let j = i + 1; j < 12; j++) {
              const dx = verts[i][0] - verts[j][0];
              const dy = verts[i][1] - verts[j][1];
              const dz = verts[i][2] - verts[j][2];
              if (Math.abs(dx*dx + dy*dy + dz*dz - 4) < 0.01) edges.push([i, j]);
            }
          }

          const cx = 200, cy = 200, scale = 45;
          // Constant tilt around X axis — gives "looking slightly down at the stone"
          // perspective. Y-axis rotation is what animates over time.
          const tiltX = -0.35;
          const cxT = Math.cos(tiltX), sxT = Math.sin(tiltX);
          const periodMs = 30000;  // 30s per full revolution — ambient pace

          const lineEls = edges.map((_, i) => document.getElementById('edge-' + i));
          const silhouetteEl = document.getElementById('ico-silhouette');

          function project(v, sY, cY) {
            // Constant X tilt
            const y1 = v[1] * cxT - v[2] * sxT;
            const z1 = v[1] * sxT + v[2] * cxT;
            // Animated Y rotation
            const x2 = v[0] * cY + z1 * sY;
            const z2 = -v[0] * sY + z1 * cY;
            return { x: cx + x2 * scale, y: cy - y1 * scale, z: z2 };
          }

          // Andrew's monotone-chain convex hull. The icosahedron is convex, so the
          // 2D silhouette is the convex hull of its projected vertices.
          function convexHull(pts) {
            const sorted = pts.slice().sort((a, b) => a.x - b.x || a.y - b.y);
            const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
            const lower = [], upper = [];
            for (const p of sorted) {
              while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
              lower.push(p);
            }
            for (let i = sorted.length - 1; i >= 0; i--) {
              const p = sorted[i];
              while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
              upper.push(p);
            }
            return lower.slice(0, -1).concat(upper.slice(0, -1));
          }

          const start = performance.now();

          function tick(t) {
            const angle = ((t - start) / periodMs) * 2 * Math.PI;
            const sY = Math.sin(angle), cY = Math.cos(angle);
            const proj = verts.map(v => project(v, sY, cY));

            const hull = convexHull(proj);
            silhouetteEl.setAttribute('points',
              hull.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' '));

            for (let i = 0; i < edges.length; i++) {
              const [a, b] = edges[i];
              const pA = proj[a], pB = proj[b];
              const line = lineEls[i];
              line.setAttribute('x1', pA.x.toFixed(1));
              line.setAttribute('y1', pA.y.toFixed(1));
              line.setAttribute('x2', pB.x.toFixed(1));
              line.setAttribute('y2', pB.y.toFixed(1));
              if ((pA.z + pB.z) / 2 < 0) {
                line.setAttribute('stroke-dasharray', '4 3');
              } else {
                line.removeAttribute('stroke-dasharray');
              }
            }

            requestAnimationFrame(tick);
          }

          // Draw initial frame synchronously so first paint shows the stone, not a blank.
          tick(performance.now());
        })();
      ]]></script>
    </svg>

    <p class="tagline">Digital twin engine for European smallsat operators.</p>
    <p class="status">Coming soon</p>
  </main>
</body>
</html>
